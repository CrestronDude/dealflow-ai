name: CI — DealFlow AI
on:
  push:
    branches: [master, main]
jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --prefer-offline
      - run: npx tsc --noEmit
